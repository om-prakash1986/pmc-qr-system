<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMC Smart QR System API</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fb;
            color: #333;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            text-align: center;
        }
        h1 { color: #0D3E73; margin-top: 0; }
        .success {
            color: #2ECC71;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .button-group {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        a.btn {
            display: inline-block;
            background-color: #0D3E73;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.2s;
        }
        a.btn:hover { background-color: #1a5291; }
        .instructions {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-left: 4px solid #E67E22;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Backend API Running</h1>
        <div class="success">✓ The PMC QR Card System server is online.</div>
        <p>The backend application is successfully running on IIS Express.</p>
        
        <div class="button-group">
            <a href="CitizenPortal.ashx" class="btn">View Citizen QR Portal</a>
            <a href="admin_dashboard/index.html" class="btn" style="background-color: #2ECC71;">View Admin Dashboard</a>
        </div>
    </div>
</body>
</html>
